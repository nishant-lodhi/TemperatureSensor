# ─────────────────────────────────────────────────────────────────────────────
# CD — Continuous Deployment
#
# Automatically deploys to the correct AWS environment:
#   • Push to "develop" branch → deploys to DEV
#   • Push to "main" branch   → deploys to STAGING
#   • Git tag "v*"             → deploys to PROD (requires manual approval)
#   • Manual trigger           → deploys to whichever environment you pick
#
# Auth: Uses AWS Access Keys stored as GitHub Secrets.
# ─────────────────────────────────────────────────────────────────────────────

name: CD — Deploy

on:
  push:
    branches: [develop, main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Step 1: Run the CI checks first ──────────────────────────────────────
  ci-gate:
    name: CI Gate (lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: |
            dashboard/requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r ../requirements-dev.txt
      - name: Lint
        run: python -m ruff check app/ tests/
      - name: Test
        run: python -m pytest tests/ -v --tb=short

  # ── Step 2: Deploy to AWS ────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ needs.set-env.outputs.environment }}
    needs: [ci-gate, set-env]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ needs.set-env.outputs.environment }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: dashboard/requirements.txt

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: SAM build
        run: sam build --template-file infra/template.yaml

      - name: SAM deploy
        run: |
          sam deploy \
            --config-env ${{ needs.set-env.outputs.environment }} \
            --config-file infra/samconfig.toml \
            --parameter-overrides \
              "MysqlPassword=${{ secrets.MYSQL_PASSWORD }}" \
              "CookieSecret=${{ secrets.COOKIE_SECRET }}" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Print deployed URL
        run: |
          STACK=${{ vars.STACK_NAME || format('{0}-Dashboard-{1}', vars.PROJECT_PREFIX || 'TempSensor', needs.set-env.outputs.environment) }}
          URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" \
            --query 'Stacks[0].Outputs[?OutputKey==`DashboardUrl`].OutputValue' \
            --output text 2>/dev/null || echo "N/A")
          echo "### Deployed Dashboard URL" >> $GITHUB_STEP_SUMMARY
          echo "$URL" >> $GITHUB_STEP_SUMMARY

  # ── Helper: Determine which environment to deploy to ─────────────────────
  set-env:
    name: Determine environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.pick.outputs.env }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "env=prod" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env=staging" >> "$GITHUB_OUTPUT"
          else
            echo "env=dev" >> "$GITHUB_OUTPUT"
          fi
