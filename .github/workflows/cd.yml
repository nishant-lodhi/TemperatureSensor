# CD — Deploy to any server.
#
# Two triggers:
#   1. Manual dispatch — pick any server from the dropdown (dev, staging, prod-*, govcloud-*)
#   2. Git tag (v*) — auto-runs for all prod servers (each gated by Environment approval)
#
# Prerequisites (one-time per server):
#   1. Create GitHub Environment matching the server name (e.g. "dev", "prod-a")
#   2. Set environment secrets: AWS_DEPLOY_ROLE_ARN, DEPLOYMENT_ID
#   3. Set environment variable: AWS_REGION (e.g. us-west-2, us-gov-west-1)
#   4. For prod environments: add "Required reviewers" protection rule
#   5. Optionally add "Wait timer" (e.g. 5 minutes) for extra safety
#
# Until you set up these prerequisites, this workflow will not run.
# You can continue deploying manually with `sam deploy` as before.

name: CD — Deploy

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      server:
        description: "Target server to deploy to"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod-a
          - prod-b
          - prod-c
          - govcloud-dev
          - govcloud-prod

permissions:
  id-token: write
  contents: read

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  #  MANUAL DISPATCH — deploy to any single server
  # ═══════════════════════════════════════════════════════════════════════════

  deploy-manual:
    name: Deploy to ${{ github.event.inputs.server }}
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.server }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r src/requirements.txt -r dashboard/requirements.txt -r requirements-dev.txt
          pip install aws-sam-cli

      - name: Run tests
        run: make test

      - name: Lint
        run: make lint

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}

      - name: SAM Build + Deploy
        run: |
          sam build --template infra/template.yaml
          sam deploy \
            --config-env "${{ github.event.inputs.server }}" \
            --config-file infra/samconfig.toml \
            --no-fail-on-empty-changeset \
            --no-confirm-changeset \
            --parameter-overrides "DeploymentId=${{ secrets.DEPLOYMENT_ID }}"

      - name: Show stack outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name "TempMonitor-${{ github.event.inputs.server }}" \
            --query 'Stacks[0].Outputs' --output table || true

  # ═══════════════════════════════════════════════════════════════════════════
  #  TAG TRIGGER (v*) — deploy to production servers with approval gates
  # ═══════════════════════════════════════════════════════════════════════════

  test:
    name: Pre-deploy Tests
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install all dependencies
        run: |
          pip install --upgrade pip
          pip install -r src/requirements.txt -r dashboard/requirements.txt -r requirements-dev.txt

      - name: Run all tests
        run: make test

      - name: Lint
        run: make lint

      - name: Validate SAM template
        run: |
          pip install aws-sam-cli
          sam validate --template infra/template.yaml --lint

  deploy-prod-a:
    name: Deploy to prod-a
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: prod-a
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SAM CLI
        run: pip install aws-sam-cli
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
      - name: SAM Build + Deploy
        run: |
          sam build --template infra/template.yaml
          sam deploy \
            --config-env prod-a \
            --config-file infra/samconfig.toml \
            --no-fail-on-empty-changeset \
            --no-confirm-changeset \
            --parameter-overrides "DeploymentId=${{ secrets.DEPLOYMENT_ID }}"
      - name: Show outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name TempMonitor-prod-a \
            --query 'Stacks[0].Outputs' --output table || true

  deploy-prod-b:
    name: Deploy to prod-b
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: prod-b
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SAM CLI
        run: pip install aws-sam-cli
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
      - name: SAM Build + Deploy
        run: |
          sam build --template infra/template.yaml
          sam deploy \
            --config-env prod-b \
            --config-file infra/samconfig.toml \
            --no-fail-on-empty-changeset \
            --no-confirm-changeset \
            --parameter-overrides "DeploymentId=${{ secrets.DEPLOYMENT_ID }}"
      - name: Show outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name TempMonitor-prod-b \
            --query 'Stacks[0].Outputs' --output table || true

  deploy-prod-c:
    name: Deploy to prod-c
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: prod-c
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SAM CLI
        run: pip install aws-sam-cli
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-west-2' }}
      - name: SAM Build + Deploy
        run: |
          sam build --template infra/template.yaml
          sam deploy \
            --config-env prod-c \
            --config-file infra/samconfig.toml \
            --no-fail-on-empty-changeset \
            --no-confirm-changeset \
            --parameter-overrides "DeploymentId=${{ secrets.DEPLOYMENT_ID }}"
      - name: Show outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name TempMonitor-prod-c \
            --query 'Stacks[0].Outputs' --output table || true

  deploy-govcloud-prod:
    name: Deploy to govcloud-prod
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: govcloud-prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install SAM CLI
        run: pip install aws-sam-cli
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || 'us-gov-west-1' }}
      - name: SAM Build + Deploy
        run: |
          sam build --template infra/template.yaml
          sam deploy \
            --config-env govcloud-prod \
            --config-file infra/samconfig.toml \
            --no-fail-on-empty-changeset \
            --no-confirm-changeset \
            --parameter-overrides "DeploymentId=${{ secrets.DEPLOYMENT_ID }}"
      - name: Show outputs
        run: |
          aws cloudformation describe-stacks \
            --stack-name TempMonitor-govcloud-prod \
            --query 'Stacks[0].Outputs' --output table || true
