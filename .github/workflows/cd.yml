# CD — Deploy to any server.
#
# Pattern (inspired by Karan's article):
#   - One composite action does ALL the work (build, deploy, health check)
#   - Each server is just a thin config wrapper
#   - Tag-based production deploys with approval gates
#   - Manual dispatch for any server (dev, staging, prod)
#   - Rollback = re-run workflow with previous tag
#
# Server model:
#   server1 (prod-a)  → clients A, B     (one Lambda, multi-client)
#   server2 (prod-b)  → client A         (one Lambda, single client)
#   server3 (prod-c)  → clients A, B, C  (one Lambda, multi-client)
#   serverX (dev)     → dev/staging       (auto-deploy on merge)

name: CD — Deploy

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      server:
        description: "Target server to deploy to"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod-a
          - prod-b
          - prod-c
          - govcloud-prod

permissions:
  id-token: write
  contents: read

jobs:

  # ═══════════════════════════════════════════════════════════════════════════
  #  GATE — Run tests before ANY deployment
  # ═══════════════════════════════════════════════════════════════════════════

  test:
    name: Pre-deploy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r dashboard/requirements.txt -r requirements-dev.txt

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Validate SAM template
        run: |
          pip install aws-sam-cli
          sam validate --template infra/template.yaml --lint

  # ═══════════════════════════════════════════════════════════════════════════
  #  MANUAL DISPATCH — deploy to one server (any environment)
  # ═══════════════════════════════════════════════════════════════════════════

  deploy-manual:
    name: Deploy to ${{ github.event.inputs.server }}
    needs: [test]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.server }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy
        uses: ./.github/actions/deploy-sam
        with:
          server: ${{ github.event.inputs.server }}
          deployment_id: ${{ secrets.DEPLOYMENT_ID }}
          aws_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws_region: ${{ vars.AWS_REGION || 'us-west-2' }}
          extra_parameter_overrides: "MysqlPassword=${{ secrets.MYSQL_PASSWORD }}"

  # ═══════════════════════════════════════════════════════════════════════════
  #  TAG TRIGGER (v*) — deploy to ALL production servers (approval-gated)
  #
  #  Each server uses a GitHub Environment with required reviewers.
  #  Servers deploy in parallel — each independently approved.
  #  Rollback: re-run this workflow for the previous tag.
  # ═══════════════════════════════════════════════════════════════════════════

  deploy-prod-a:
    name: "prod-a (server1 → clients A, B)"
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: prod-a
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: ./.github/actions/deploy-sam
        with:
          server: prod-a
          deployment_id: ${{ secrets.DEPLOYMENT_ID }}
          aws_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws_region: ${{ vars.AWS_REGION || 'us-west-2' }}
          extra_parameter_overrides: "MysqlPassword=${{ secrets.MYSQL_PASSWORD }}"

  deploy-prod-b:
    name: "prod-b (server2 → client A)"
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: prod-b
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: ./.github/actions/deploy-sam
        with:
          server: prod-b
          deployment_id: ${{ secrets.DEPLOYMENT_ID }}
          aws_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws_region: ${{ vars.AWS_REGION || 'us-east-1' }}
          extra_parameter_overrides: "MysqlPassword=${{ secrets.MYSQL_PASSWORD }}"

  deploy-prod-c:
    name: "prod-c (server3 → clients A, B, C)"
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: prod-c
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: ./.github/actions/deploy-sam
        with:
          server: prod-c
          deployment_id: ${{ secrets.DEPLOYMENT_ID }}
          aws_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws_region: ${{ vars.AWS_REGION || 'us-west-2' }}
          extra_parameter_overrides: "MysqlPassword=${{ secrets.MYSQL_PASSWORD }}"

  deploy-govcloud-prod:
    name: "govcloud-prod"
    needs: [test]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: govcloud-prod
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        uses: ./.github/actions/deploy-sam
        with:
          server: govcloud-prod
          deployment_id: ${{ secrets.DEPLOYMENT_ID }}
          aws_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws_region: ${{ vars.AWS_REGION || 'us-gov-west-1' }}
          extra_parameter_overrides: "MysqlPassword=${{ secrets.MYSQL_PASSWORD }}"
