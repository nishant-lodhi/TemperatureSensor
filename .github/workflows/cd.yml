# CD — Build container image + deploy via SAM.
#
# Triggers:
#   push develop  → dev
#   push main     → staging
#   tag  v*       → all prod servers
#   manual        → chosen target
name: CD

on:
  push:
    branches: [develop, main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        type: choice
        options: [dev, staging, prod-server1]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.pick.outputs.targets }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo 'targets=["${{ inputs.target }}"]' >> "$GITHUB_OUTPUT"
          elif [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo 'targets=["prod-server1"]' >> "$GITHUB_OUTPUT"
          elif [ "$GITHUB_REF" = "refs/heads/main" ]; then
            echo 'targets=["staging"]' >> "$GITHUB_OUTPUT"
          else
            echo 'targets=["dev"]' >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ matrix.target }}
    strategy:
      matrix:
        target: ${{ fromJson(needs.resolve.outputs.targets) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Delete failed stack if exists
        run: |
          STACK=$(grep -A2 '^\[${{ matrix.target }}\.deploy\.parameters\]' infra/samconfig.toml \
            | grep stack_name | sed 's/.*= *"\(.*\)"/\1/')
          STATUS=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].StackStatus' --output text 2>/dev/null || echo "NONE")
          if [ "$STATUS" = "ROLLBACK_COMPLETE" ]; then
            echo "Deleting failed stack $STACK..."
            aws cloudformation delete-stack --stack-name "$STACK"
            aws cloudformation wait stack-delete-complete --stack-name "$STACK"
          fi

      - name: SAM build
        run: sam build --template-file infra/template.yaml

      - name: SAM deploy
        run: |
          OVERRIDES=""
          [ -n "${{ secrets.MYSQL_PASSWORD }}" ] && OVERRIDES="$OVERRIDES MysqlPassword=${{ secrets.MYSQL_PASSWORD }}"
          [ -n "${{ secrets.COOKIE_SECRET }}" ]  && OVERRIDES="$OVERRIDES CookieSecret=${{ secrets.COOKIE_SECRET }}"

          sam deploy \
            --config-env ${{ matrix.target }} \
            --config-file infra/samconfig.toml \
            ${OVERRIDES:+--parameter-overrides $OVERRIDES} \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Print URL
        if: always()
        run: |
          STACK=$(grep -A2 '^\[${{ matrix.target }}\.deploy\.parameters\]' infra/samconfig.toml \
            | grep stack_name | sed 's/.*= *"\(.*\)"/\1/')
          URL=$(aws cloudformation describe-stacks --stack-name "$STACK" \
            --query 'Stacks[0].Outputs[?OutputKey==`DashboardUrl`].OutputValue' \
            --output text 2>/dev/null || echo "N/A")
          echo "### ${{ matrix.target }} → $URL" >> "$GITHUB_STEP_SUMMARY"
