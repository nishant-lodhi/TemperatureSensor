# ─────────────────────────────────────────────────────────────────────────────
# CD — Continuous Deployment
#
# Deploys to the correct target(s) based on trigger:
#   • Push to "develop"  → deploys to DEV (1 stack)
#   • Push to "main"     → deploys to STAGING (1 stack)
#   • Git tag "v*"       → deploys to ALL prod servers (parallel, each needs approval)
#   • Manual trigger     → deploys to whichever target you pick
#
# Multi-server production:
#   Each prod server is a separate GitHub Environment (prod-server1, prod-server2, …)
#   with its own approval gate and secrets. A v* tag deploys to all of them.
#   samconfig.toml has one section per server with its own DeploymentId + DbSecretArn.
#
# Auth: AWS Access Keys stored as GitHub Secrets (per environment).
# ─────────────────────────────────────────────────────────────────────────────

name: CD — Deploy

on:
  push:
    branches: [develop, main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target (server)"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod-server1
          # Add more prod servers here as you onboard them:
          # - prod-server2
          # - prod-server3

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── CI safety gate (runs once) ───────────────────────────────────────────
  ci-gate:
    name: CI Gate (lint + test)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            dashboard/requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r ../requirements-dev.txt
      - name: Lint
        run: python -m ruff check app/ tests/
      - name: Test
        run: python -m pytest tests/ -v --tb=short

  # ── Determine which targets to deploy to ─────────────────────────────────
  resolve-targets:
    name: Resolve deploy targets
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.pick.outputs.targets }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual: deploy to the single selected target
            echo 'targets=["${{ github.event.inputs.target }}"]' >> "$GITHUB_OUTPUT"

          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # Tag: deploy to ALL production servers (parallel)
            # ── Add new prod servers to this list ──
            echo 'targets=["prod-server1"]' >> "$GITHUB_OUTPUT"

          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo 'targets=["staging"]' >> "$GITHUB_OUTPUT"

          else
            echo 'targets=["dev"]' >> "$GITHUB_OUTPUT"
          fi

  # ── Deploy (runs once per target, parallel for multi-server prod) ────────
  deploy:
    name: Deploy → ${{ matrix.target }}
    needs: [ci-gate, resolve-targets]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ matrix.target }}
    strategy:
      matrix:
        target: ${{ fromJson(needs.resolve-targets.outputs.targets) }}
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: dashboard/requirements.txt

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: SAM build (container)
        run: sam build --template-file infra/template.yaml --use-container

      - name: SAM deploy to ${{ matrix.target }}
        run: |
          sam deploy \
            --config-env ${{ matrix.target }} \
            --config-file infra/samconfig.toml \
            --parameter-overrides \
              "MysqlPassword=${{ secrets.MYSQL_PASSWORD }}" \
              "CookieSecret=${{ secrets.COOKIE_SECRET }}" \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

      - name: Print deployed URL
        run: |
          STACK=$(grep -A1 '^\[${{ matrix.target }}.deploy.parameters\]' infra/samconfig.toml \
            | grep stack_name | sed 's/.*= *"\(.*\)"/\1/')
          URL=$(aws cloudformation describe-stacks \
            --stack-name "$STACK" \
            --query 'Stacks[0].Outputs[?OutputKey==`DashboardUrl`].OutputValue' \
            --output text 2>/dev/null || echo "N/A")
          echo "### ${{ matrix.target }} → $URL" >> $GITHUB_STEP_SUMMARY
