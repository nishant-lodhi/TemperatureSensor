# ─────────────────────────────────────────────────────────────────────────────
# CI — Runs on every Pull Request to main or develop.
# Purpose: Catch bugs BEFORE merging. If any step fails, the PR is blocked.
#
# What it does:
#   1. Lint + Test under Python 3.14 (matches Lambda runtime)
#   2. SAM validate + build under Python 3.12 (SAM CLI has pydantic v1
#      incompatibility with 3.14). Container build still targets 3.14.
# ─────────────────────────────────────────────────────────────────────────────

name: CI — Lint, Test, Validate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Test + Validate + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── App code checks (Python 3.14) ────────────────────────────────────
      - name: Set up Python 3.14 (app runtime)
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            dashboard/requirements.txt
            requirements-dev.txt

      - name: Install app dependencies
        working-directory: dashboard
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r ../requirements-dev.txt

      - name: Lint (ruff)
        working-directory: dashboard
        run: python -m ruff check app/ tests/

      - name: Unit tests (pytest)
        working-directory: dashboard
        run: python -m pytest tests/ -v --tb=short

      # ── SAM CLI checks (Python 3.12 — SAM CLI incompatible with 3.14) ───
      - name: Set up Python 3.12 (SAM CLI host)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Validate SAM template
        run: sam validate --template-file infra/template.yaml

      - name: SAM build (Docker image)
        run: sam build --template-file infra/template.yaml
