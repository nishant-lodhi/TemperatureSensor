# ─────────────────────────────────────────────────────────────────────────────
# CI — Runs on every Pull Request to main or develop.
# Purpose: Catch bugs BEFORE merging. If any step fails, the PR is blocked.
#
# What it does:
#   1. Installs Python 3.14 and all dependencies
#   2. Runs linter (ruff) to check code style
#   3. Runs all unit tests
#   4. Validates the SAM CloudFormation template
#   5. Container-based SAM build (matches Lambda runtime exactly)
# ─────────────────────────────────────────────────────────────────────────────

name: CI — Lint, Test, Validate

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint + Test + Validate + Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            dashboard/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r ../requirements-dev.txt

      - name: Lint (ruff)
        run: python -m ruff check app/ tests/

      - name: Unit tests (pytest)
        run: python -m pytest tests/ -v --tb=short

      - name: Validate SAM template
        run: |
          pip install aws-sam-cli
          sam validate --template-file ../infra/template.yaml --lint

      - name: SAM build (container)
        run: sam build --template-file ../infra/template.yaml --use-container
