# CI — runs on every push and pull request.
#
# Pattern (inspired by Karan's article):
#   - Every PR runs lint + test + SAM validate (quality gate)
#   - Push to develop → auto-deploy to DEV (zero friction)
#   - Push to main    → auto-deploy to STAGING (promotion)
#   - Production      → only via CD workflow (tag-based, approval-gated)

name: CI — Test & Lint

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:

  # ── Quality Gate: Lint + Test + Validate ─────────────────────────────────
  dashboard:
    name: Dashboard Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r dashboard/requirements.txt -r requirements-dev.txt

      - name: Lint
        run: make lint

      - name: Test
        run: make test

  validate-template:
    name: Validate SAM Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Validate template syntax
        run: sam validate --template infra/template.yaml --lint

  # ── Auto-deploy to DEV on push to develop ────────────────────────────────
  deploy-dev:
    name: Auto-deploy to DEV
    needs: [dashboard, validate-template]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to dev
        uses: ./.github/actions/deploy-sam
        with:
          server: dev
          deployment_id: ${{ secrets.DEPLOYMENT_ID }}
          aws_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws_region: ${{ vars.AWS_REGION || 'us-west-2' }}
          extra_parameter_overrides: "MysqlPassword=${{ secrets.MYSQL_PASSWORD }}"

  # ── Auto-deploy to STAGING on push to main ───────────────────────────────
  deploy-staging:
    name: Auto-deploy to STAGING
    needs: [dashboard, validate-template]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging
        uses: ./.github/actions/deploy-sam
        with:
          server: staging
          deployment_id: ${{ secrets.DEPLOYMENT_ID }}
          aws_role_arn: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws_region: ${{ vars.AWS_REGION || 'us-west-2' }}
          extra_parameter_overrides: "MysqlPassword=${{ secrets.MYSQL_PASSWORD }}"
