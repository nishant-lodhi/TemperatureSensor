# CI — runs on every push and every pull request.
# Tests backend + dashboard, validates SAM template, checks code quality.
#
# This workflow ONLY tests. It does NOT deploy anything.
# All deployments are handled by cd.yml (manual dispatch or tag trigger).

name: CI — Test & Lint

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend Tests ──────────────────────────────────────────────────────────
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r src/requirements.txt -r requirements-dev.txt

      - name: Run tests
        run: make test-backend

  # ── Dashboard Tests ────────────────────────────────────────────────────────
  dashboard:
    name: Dashboard Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r dashboard/requirements.txt -r requirements-dev.txt

      - name: Lint
        run: make lint-dashboard

      - name: Test
        run: make test-dashboard

  # ── SAM Template Validation ────────────────────────────────────────────────
  validate-template:
    name: Validate SAM Template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Validate template syntax
        run: sam validate --template infra/template.yaml --lint
