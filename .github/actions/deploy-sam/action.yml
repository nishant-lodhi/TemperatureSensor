# Composite action: centralized SAM deploy logic.
# All environments deploy the same way — only credentials and params change.
#
# Pattern (from Karan's article): one action, N environments.
#   - Staging auto-deploys on merge to develop
#   - Production deploys only on Git tags
#   - Rollback = redeploy previous tag
#
# Each server is a singleton Lambda serving multiple clients.
# Data isolation via client_id in middleware (shared-schema, row-level).

name: "Deploy SAM Stack"
description: "Build, deploy, and health-check the TempMonitor dashboard for any server"

inputs:
  server:
    description: "Server name matching samconfig.toml section (dev, staging, prod-a, etc.)"
    required: true
  deployment_id:
    description: "10-char deployment identifier for this server"
    required: true
  aws_role_arn:
    description: "IAM role ARN for OIDC-based authentication"
    required: true
  aws_region:
    description: "AWS region"
    required: false
    default: "us-west-2"
  extra_parameter_overrides:
    description: "Additional SAM parameter overrides (space-separated Key=Value pairs)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:

    # ── 1. Configure AWS via OIDC (no stored keys) ──────────────────────────
    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws_role_arn }}
        aws-region: ${{ inputs.aws_region }}

    # ── 2. Setup Python + SAM CLI ───────────────────────────────────────────
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: pip

    - name: Install SAM CLI
      shell: bash
      run: pip install aws-sam-cli

    # ── 3. Build ────────────────────────────────────────────────────────────
    - name: SAM build
      shell: bash
      run: sam build --template infra/template.yaml

    # ── 4. Deploy ───────────────────────────────────────────────────────────
    - name: SAM deploy
      shell: bash
      run: |
        OVERRIDES="DeploymentId=${{ inputs.deployment_id }}"
        if [ -n "${{ inputs.extra_parameter_overrides }}" ]; then
          OVERRIDES="$OVERRIDES ${{ inputs.extra_parameter_overrides }}"
        fi

        sam deploy \
          --config-env "${{ inputs.server }}" \
          --config-file infra/samconfig.toml \
          --no-fail-on-empty-changeset \
          --no-confirm-changeset \
          --parameter-overrides "$OVERRIDES"

    # ── 5. Health check — verify the system is actually running ─────────────
    - name: Health check — Dashboard Lambda
      shell: bash
      run: |
        DEPLOY_ID="${{ inputs.deployment_id }}"
        REGION="${{ inputs.aws_region }}"

        # Detect environment from samconfig (stack name pattern: TempMonitor-{server})
        STACK_NAME=$(aws cloudformation list-stacks \
          --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE \
          --query "StackSummaries[?contains(StackName,'TempMonitor') && contains(StackName,'${DEPLOY_ID}')].StackName" \
          --output text --region "$REGION" | head -1)

        if [ -z "$STACK_NAME" ]; then
          echo "WARN: Could not auto-detect stack name, trying convention..."
          STACK_NAME="TempMonitor-saas-${{ inputs.server }}"
        fi

        echo "Stack: $STACK_NAME"

        echo "--- Check 1: Dashboard Lambda is Active ---"
        FUNC_NAME="TempMonitor-Dashboard-${DEPLOY_ID}"
        LAMBDA_STATE=$(aws lambda list-functions \
          --query "Functions[?contains(FunctionName,'${FUNC_NAME}')].{Name:FunctionName,State:State,Modified:LastModified}" \
          --output table --region "$REGION" 2>&1)
        echo "$LAMBDA_STATE"

        FUNC_MATCH=$(aws lambda list-functions \
          --query "Functions[?contains(FunctionName,'${FUNC_NAME}')].FunctionName" \
          --output text --region "$REGION")

        if [ -z "$FUNC_MATCH" ]; then
          echo "FAIL: No Lambda matching '${FUNC_NAME}' found"
          exit 1
        fi
        echo "OK: Dashboard Lambda found: $FUNC_MATCH"

        echo "--- Check 2: API Gateway Endpoint ---"
        DASHBOARD_URL=$(aws cloudformation describe-stacks \
          --stack-name "$STACK_NAME" \
          --query 'Stacks[0].Outputs[?OutputKey==`DashboardUrl`].OutputValue' \
          --output text --region "$REGION" 2>&1) || true

        if [ -n "$DASHBOARD_URL" ] && [ "$DASHBOARD_URL" != "None" ]; then
          echo "Dashboard URL: $DASHBOARD_URL"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${DASHBOARD_URL}/connect/healthcheck" --max-time 10 2>/dev/null) || HTTP_CODE="timeout"
          echo "HTTP response: $HTTP_CODE"
          # 403/404 is expected (no valid token), 5xx or timeout is bad
          if [[ "$HTTP_CODE" =~ ^5 ]] || [ "$HTTP_CODE" = "timeout" ]; then
            echo "WARN: Dashboard returned $HTTP_CODE — check Lambda logs"
          else
            echo "OK: Dashboard is responding"
          fi
        else
          echo "WARN: Could not retrieve Dashboard URL from stack outputs"
        fi

        echo "--- Check 3: CloudWatch Alarm Exists ---"
        ALARM_NAME="TempMonitor-Dashboard-Errors-${DEPLOY_ID}"
        ALARM_STATE=$(aws cloudwatch describe-alarms \
          --alarm-name-prefix "$ALARM_NAME" \
          --query 'MetricAlarms[0].StateValue' \
          --output text --region "$REGION" 2>&1) || ALARM_STATE="NOT_FOUND"
        echo "Alarm state: $ALARM_STATE"

        echo "=== All health checks passed ==="

    # ── 6. Show outputs ─────────────────────────────────────────────────────
    - name: Show stack outputs
      shell: bash
      run: |
        DEPLOY_ID="${{ inputs.deployment_id }}"
        REGION="${{ inputs.aws_region }}"

        STACK_NAME=$(aws cloudformation list-stacks \
          --stack-status-filter CREATE_COMPLETE UPDATE_COMPLETE \
          --query "StackSummaries[?contains(StackName,'TempMonitor') && contains(StackName,'${DEPLOY_ID}')].StackName" \
          --output text --region "$REGION" | head -1) || true

        if [ -n "$STACK_NAME" ]; then
          echo "Stack: $STACK_NAME"
          aws cloudformation describe-stacks \
            --stack-name "$STACK_NAME" \
            --query 'Stacks[0].Outputs' --output table \
            --region "$REGION" || true
        fi
