AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  TempSensor — Dashboard stack with hybrid data (MySQL/Parquet),
  DynamoDB alerts, and multi-tenant auth.

# ── Naming Convention ──────────────────────────────────────────────────────
# All resources: {ProjectPrefix}-{Resource}-{DeploymentId}-{Environment}
# Example:       TempSensor-Dashboard-a1b2c3d4e5-prod
# ───────────────────────────────────────────────────────────────────────────

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Default: dev
  DeploymentId:
    Type: String
    Description: "Unique 10-char ID per server."
    AllowedPattern: "[a-z0-9]{10}"
    Default: "0000000000"
  ProjectPrefix:
    Type: String
    Default: TempSensor
    Description: "Prefix for all resource names"
  CookieSecret:
    Type: String
    Default: ""
    NoEcho: true

  # ── DB credentials (stored in Secrets Manager, never as Lambda env vars) ──
  MysqlHost:
    Type: String
    Description: "Aurora/RDS endpoint"
    Default: ""
  MysqlPort:
    Type: String
    Default: "3306"
  MysqlUser:
    Type: String
    Default: ""
    NoEcho: true
  MysqlPassword:
    Type: String
    Default: ""
    NoEcho: true
  MysqlDatabase:
    Type: String
    Default: ""

  DataSource:
    Type: String
    AllowedValues: ["mysql", "parquet", "hybrid"]
    Default: "mysql"
  ParquetBucket:
    Type: String
    Default: ""
  ParquetPrefix:
    Type: String
    Default: "sensor-data/"
  ClientsYaml:
    Type: String
    Description: "Path to clients.yaml inside Lambda package (optional)"
    Default: "clients.yaml"

Conditions:
  GenerateCookieSecret: !Equals [!Ref CookieSecret, ""]
  HasParquetBucket: !Not [!Equals [!Ref ParquetBucket, ""]]
  HasDbCreds: !Not [!Equals [!Ref MysqlHost, ""]]

Globals:
  Function:
    Architectures: [x86_64]
    MemorySize: 256
    Timeout: 60
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        DEPLOYMENT_ID: !Ref DeploymentId

Resources:

  # ── Secrets Manager: DB credentials ──────────────────────────────────────
  # Created automatically by the stack. Lambda reads this at runtime.
  # Credentials are passed as NoEcho parameters → never visible in console.
  DbSecret:
    Type: AWS::SecretsManager::Secret
    Condition: HasDbCreds
    Properties:
      Name: !Sub "${ProjectPrefix}/${DeploymentId}/${Environment}/db"
      Description: !Sub "DB credentials for ${ProjectPrefix} ${Environment}"
      SecretString: !Sub |
        {
          "host": "${MysqlHost}",
          "port": ${MysqlPort},
          "username": "${MysqlUser}",
          "password": "${MysqlPassword}",
          "dbname": "${MysqlDatabase}"
        }
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref Environment
        - Key: DeploymentId
          Value: !Ref DeploymentId

  # ── DynamoDB: Alert persistence ─────────────────────────────────────────
  AlertsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-Alerts-${DeploymentId}-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
        - { AttributeName: client_id, AttributeType: S }
        - { AttributeName: state_triggered, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: ClientActiveAlerts
          KeySchema:
            - { AttributeName: client_id, KeyType: HASH }
            - { AttributeName: state_triggered, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
      TimeToLiveSpecification:
        AttributeName: TTL
        Enabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref Environment
        - Key: DeploymentId
          Value: !Ref DeploymentId

  # ── Note Lambda (lightweight — receives alert details from Dashboard) ──
  NoteLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectPrefix}-NoteLambda-Role-${DeploymentId}-${Environment}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  NoteLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-NoteLambda-${DeploymentId}-${Environment}"
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      MemorySize: 128
      Role: !GetAtt NoteLambdaRole.Arn
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          DEPLOYMENT_ID: !Ref DeploymentId
          PROJECT_PREFIX: !Ref ProjectPrefix
      Code:
        ZipFile: |
          import json
          import logging

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)

          def handler(event, context):
              """Receives alert note details from the Dashboard Lambda.

              Payload:
                {
                  "device_id": "AA:BB:CC:DD:EE:FF",
                  "alert_type": "critical_high",
                  "timestamp": "2026-03-13T18:30:00+00:00",
                  "sensor_state": {
                    "device_id": "AA:BB:CC:DD:EE:FF",
                    "location": "01-Facility",
                    "temp": 82.5,
                    "battery": 95,
                    "signal": -45,
                    "status": "online",
                    "last_seen": "2026-03-13T18:29:55+00:00",
                    "readings": [...],
                    "alerts": [...]
                  }
                }

              Extend this function to: send email, create ticket, push to
              Slack/Teams, write to external DB, etc.
              """
              logger.info("Alert note received: %s", json.dumps(event))
                  return {"statusCode": 200, "body": "Note processed"}
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref Environment
        - Key: DeploymentId
          Value: !Ref DeploymentId

  # ── API Gateway ─────────────────────────────────────────────────────────
  DashboardApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Description: !Sub "${ProjectPrefix} Dashboard API — ${DeploymentId} ${Environment}"
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: ["GET", "POST"]
        AllowHeaders: ["*"]
      Tags:
        Project: !Ref ProjectPrefix
        Environment: !Ref Environment
        DeploymentId: !Ref DeploymentId

  # ── Dashboard Lambda (Container Image — bypasses 250 MB ZIP limit) ───
  DashboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-Dashboard-${DeploymentId}-${Environment}"
      PackageType: Image
      ImageConfig:
        Command: ["lambda_handler.handler"]
      MemorySize: 512
      Timeout: 60
      Environment:
        Variables:
          AWS_MODE: "true"
          DATA_SOURCE: !Ref DataSource
          DB_SECRET_ARN: !If
            - HasDbCreds
            - !Ref DbSecret
            - ""
          PARQUET_BUCKET: !Ref ParquetBucket
          PARQUET_PREFIX: !Ref ParquetPrefix
          ALERTS_TABLE: !Ref AlertsTable
          NOTE_LAMBDA_ARN: !GetAtt NoteLambda.Arn
          CLIENTS_YAML: !Ref ClientsYaml
          PROJECT_PREFIX: !Ref ProjectPrefix
          COOKIE_SECRET: !If
            - GenerateCookieSecret
            - !Sub "auto-${DeploymentId}-${AWS::StackName}"
            - !Ref CookieSecret
      Tags:
        Project: !Ref ProjectPrefix
        Environment: !Ref Environment
        DeploymentId: !Ref DeploymentId
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action: [secretsmanager:ListSecrets]
              Resource: "*"
            - Effect: Allow
              Action: [secretsmanager:GetSecretValue]
              Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectPrefix}/${DeploymentId}/*"
        - DynamoDBCrudPolicy:
            TableName: !Ref AlertsTable
        - !If
          - HasParquetBucket
          - S3ReadPolicy:
              BucketName: !Ref ParquetBucket
          - !Ref AWS::NoValue
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action: [lambda:InvokeFunction]
              Resource: !GetAtt NoteLambda.Arn
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref DashboardApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref DashboardApi
            Path: /
            Method: ANY
    Metadata:
      DockerTag: !Sub "${Environment}-latest"
      DockerContext: ../dashboard
      Dockerfile: Dockerfile.lambda

  # ── CloudWatch Alarm ────────────────────────────────────────────────────
  DashboardErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectPrefix}-Dashboard-Errors-${DeploymentId}-${Environment}"
      AlarmDescription: !Sub "${ProjectPrefix} Dashboard Lambda 5+ errors in 5 minutes."
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref DashboardFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  DashboardUrl:
    Description: "Dashboard URL (API Gateway)"
    Value: !Sub "https://${DashboardApi}.execute-api.${AWS::Region}.amazonaws.com"
  AlertsTableName:
    Description: "DynamoDB alerts table name"
    Value: !Ref AlertsTable
  DbSecretArn:
    Condition: HasDbCreds
    Description: "Secrets Manager ARN for DB credentials"
    Value: !Ref DbSecret
  DashboardFunctionName:
    Description: "Dashboard Lambda function name"
    Value: !Ref DashboardFunction
  NoteLambdaArn:
    Description: "Note Lambda ARN (receives alert details on Note click)"
    Value: !GetAtt NoteLambda.Arn
  StackNamingPattern:
    Description: "Resource naming convention used"
    Value: !Sub "${ProjectPrefix}-{Resource}-${DeploymentId}-${Environment}"
