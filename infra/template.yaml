AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  TempMonitor — Dashboard stack with hybrid data (MySQL/Parquet),
  DynamoDB alerts, and multi-tenant auth.

# ── Naming Convention ──────────────────────────────────────────────────────
# All resources: {ProjectPrefix}-{Resource}-{DeploymentId}-{Environment}
# Example:       TempSensor-Dashboard-a1b2c3d4e5-prod
# ───────────────────────────────────────────────────────────────────────────

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, prod]
    Default: dev
  DeploymentId:
    Type: String
    Description: "Unique 10-char ID per server."
    AllowedPattern: "[a-z0-9]{10}"
    Default: "0000000000"
  ProjectPrefix:
    Type: String
    Default: TempSensor
    Description: "Prefix for all resource names (no spaces, alphanumeric + hyphens)"
  CookieSecret:
    Type: String
    Default: ""
    NoEcho: true
  MysqlHost:
    Type: String
    Default: ""
  MysqlPort:
    Type: String
    Default: "3306"
  MysqlUser:
    Type: String
    Default: ""
    NoEcho: true
  MysqlPassword:
    Type: String
    Default: ""
    NoEcho: true
  MysqlDatabase:
    Type: String
    Default: "Demo_aurora"
  DataSource:
    Type: String
    AllowedValues: ["mysql", "parquet", "hybrid"]
    Default: "mysql"
  ParquetBucket:
    Type: String
    Default: ""
  ParquetPrefix:
    Type: String
    Default: "sensor-data/"
  NoteLambdaArn:
    Type: String
    Description: "ARN of Lambda to invoke for officer notes (optional)"
    Default: ""
  ClientsYaml:
    Type: String
    Description: "Path to clients.yaml inside Lambda package (optional)"
    Default: "clients.yaml"

Conditions:
  GenerateCookieSecret: !Equals [!Ref CookieSecret, ""]
  HasParquetBucket: !Not [!Equals [!Ref ParquetBucket, ""]]
  HasNoteLambda: !Not [!Equals [!Ref NoteLambdaArn, ""]]

Globals:
  Function:
    Runtime: python3.11
    Architectures: [x86_64]
    MemorySize: 256
    Timeout: 60
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        DEPLOYMENT_ID: !Ref DeploymentId

Resources:

  # ── DynamoDB: Alert persistence ─────────────────────────────────────────
  AlertsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-Alerts-${DeploymentId}-${Environment}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: PK, AttributeType: S }
        - { AttributeName: SK, AttributeType: S }
        - { AttributeName: client_id, AttributeType: S }
        - { AttributeName: state_triggered, AttributeType: S }
      KeySchema:
        - { AttributeName: PK, KeyType: HASH }
        - { AttributeName: SK, KeyType: RANGE }
      GlobalSecondaryIndexes:
        - IndexName: ClientActiveAlerts
          KeySchema:
            - { AttributeName: client_id, KeyType: HASH }
            - { AttributeName: state_triggered, KeyType: RANGE }
          Projection: { ProjectionType: ALL }
      TimeToLiveSpecification:
        AttributeName: TTL
        Enabled: true
      Tags:
        - Key: Project
          Value: !Ref ProjectPrefix
        - Key: Environment
          Value: !Ref Environment
        - Key: DeploymentId
          Value: !Ref DeploymentId

  # ── API Gateway ─────────────────────────────────────────────────────────
  DashboardApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: $default
      Description: !Sub "${ProjectPrefix} Dashboard API — ${DeploymentId} ${Environment}"
      CorsConfiguration:
        AllowOrigins: ["*"]
        AllowMethods: ["GET", "POST"]
        AllowHeaders: ["*"]
      Tags:
        Project: !Ref ProjectPrefix
        Environment: !Ref Environment
        DeploymentId: !Ref DeploymentId

  # ── Dashboard Lambda ────────────────────────────────────────────────────
  DashboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-Dashboard-${DeploymentId}-${Environment}"
      Handler: lambda_handler.handler
      CodeUri: ../dashboard/
      MemorySize: 512
      Timeout: 30
      Environment:
        Variables:
          AWS_MODE: "true"
          DATA_SOURCE: !Ref DataSource
          MYSQL_HOST: !Ref MysqlHost
          MYSQL_PORT: !Ref MysqlPort
          MYSQL_USER: !Ref MysqlUser
          MYSQL_PASSWORD: !Ref MysqlPassword
          MYSQL_DATABASE: !Ref MysqlDatabase
          PARQUET_BUCKET: !Ref ParquetBucket
          PARQUET_PREFIX: !Ref ParquetPrefix
          ALERTS_TABLE: !Ref AlertsTable
          NOTE_LAMBDA_ARN: !Ref NoteLambdaArn
          CLIENTS_YAML: !Ref ClientsYaml
          PROJECT_PREFIX: !Ref ProjectPrefix
          COOKIE_SECRET: !If
            - GenerateCookieSecret
            - !Sub "auto-${DeploymentId}-${AWS::StackName}"
            - !Ref CookieSecret
      Tags:
        Project: !Ref ProjectPrefix
        Environment: !Ref Environment
        DeploymentId: !Ref DeploymentId
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action: [secretsmanager:ListSecrets]
              Resource: "*"
            - Effect: Allow
              Action: [secretsmanager:GetSecretValue]
              Resource: !Sub "arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectPrefix}/${DeploymentId}/*"
        - DynamoDBCrudPolicy:
            TableName: !Ref AlertsTable
        - !If
          - HasParquetBucket
          - S3ReadPolicy:
              BucketName: !Ref ParquetBucket
          - !Ref AWS::NoValue
        - !If
          - HasNoteLambda
          - Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: [lambda:InvokeFunction]
                Resource: !Ref NoteLambdaArn
          - !Ref AWS::NoValue
      Events:
        CatchAll:
          Type: HttpApi
          Properties:
            ApiId: !Ref DashboardApi
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            ApiId: !Ref DashboardApi
            Path: /
            Method: ANY

  # ── CloudWatch Alarm ────────────────────────────────────────────────────
  DashboardErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${ProjectPrefix}-Dashboard-Errors-${DeploymentId}-${Environment}"
      AlarmDescription: !Sub "${ProjectPrefix} Dashboard Lambda 5+ errors in 5 minutes."
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref DashboardFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching

Outputs:
  DashboardUrl:
    Description: "Dashboard URL (API Gateway)"
    Value: !Sub "https://${DashboardApi}.execute-api.${AWS::Region}.amazonaws.com"
  AlertsTableName:
    Description: "DynamoDB alerts table name"
    Value: !Ref AlertsTable
  DashboardFunctionName:
    Description: "Dashboard Lambda function name"
    Value: !Ref DashboardFunction
  StackNamingPattern:
    Description: "Resource naming convention used"
    Value: !Sub "${ProjectPrefix}-{Resource}-${DeploymentId}-${Environment}"
