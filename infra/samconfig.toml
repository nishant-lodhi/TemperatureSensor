# ─────────────────────────────────────────────────────────────────────────────
# SAM Deploy Configuration — one section per deployment target
#
# Structure:
#   dev              → 1 dev stack
#   staging          → 1 staging stack
#   prod-server1     → Production server 1 (e.g., Region West — clients 14, 27)
#   prod-server2     → Production server 2 (uncomment when needed)
#
# MysqlPassword is injected by CD pipeline (from GitHub Secrets) or passed
# manually. CloudFormation auto-creates a Secrets Manager secret from params.
# IMPORTANT: --parameter-overrides on CLI REPLACES samconfig values.
# Never use --parameter-overrides manually; use `sam deploy --config-env <env>`.
# ─────────────────────────────────────────────────────────────────────────────

version = 0.1

# ── DEV ─────────────────────────────────────────────────────────────────────
[dev.deploy.parameters]
stack_name           = "TempSensor-Dashboard-dev"
resolve_s3           = true
image_repositories   = ["DashboardFunction=103333772143.dkr.ecr.us-west-2.amazonaws.com/tempsensor-dashboard-9f64e31089-dev"]
capabilities         = "CAPABILITY_NAMED_IAM"
confirm_changeset    = false
region               = "us-west-2"
parameter_overrides = "Environment=dev DeploymentId=9f64e31089 ProjectPrefix=TempSensor DataSource=mysql MysqlHost=demo-new-db-cluster.cluster-ro-cyxsij4cwahs.us-east-1.rds.amazonaws.com MysqlUser=Demo_aurora MysqlDatabase=Demo_aurora MysqlPassword=N0t32023#d3m0"

