# SAM deploy configuration — one section per server/environment.
# Usage: sam deploy --config-env dev --config-file infra/samconfig.toml
#
# Generate a DeploymentId (run once per server):
#   python3 -c "import uuid; print(uuid.uuid4().hex[:10])"
#
# Key parameters:
#   SyntheticMode  = true  → creates Synthetic Generator Lambda (fake data)
#   EnableIoTRule  = true  → creates IoT Rule + BLE Adapter Lambda (real sensors)
#   IoTTopicPattern        → MQTT topic for real sensors

version = 0.1

[default.build.parameters]
template = "infra/template.yaml"

[default.deploy.parameters]
resolve_s3 = true
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
region = "us-west-2"

# ── DEV (standard AWS — synthetic data) ─────────────────────────────────────
[dev.deploy.parameters]
stack_name = "TempMonitor-saas-dev"
resolve_s3 = true
capabilities = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
parameter_overrides = "Environment=dev DeploymentId=244d4b8211 ProjectPrefix=temp-sensor SyntheticMode=true EnableIoTRule=false"
confirm_changeset = false
region = "us-west-2"

