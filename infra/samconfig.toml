# SAM deploy configuration — one section per server.
#
# Architecture:
#   - One Lambda (singleton) per server
#   - Multiple clients per server (data isolated by client_id)
#   - Processing shared, data segregated
#
# Server → Client mapping:
#   server1 (prod-a)  → client A, client B
#   server2 (prod-b)  → client A
#   server3 (prod-c)  → client A, client B, client C
#   serverX (dev)     → dev/staging shared
#
# Clients are managed via: scripts/manage_client.py (Secrets Manager)
# Each client gets a unique access URL: /connect/{token}
#
# Usage:
#   sam deploy --config-env dev --config-file infra/samconfig.toml
#
# Generate a DeploymentId (run once per server):
#   python3 -c "import uuid; print(uuid.uuid4().hex[:10])"

version = 0.1

# ── Shared defaults ──────────────────────────────────────────────────────────
[default.build.parameters]
template = "infra/template.yaml"

[default.deploy.parameters]
resolve_s3 = true
capabilities = "CAPABILITY_IAM"
region = "us-west-2"

# ══════════════════════════════════════════════════════════════════════════════
#  NON-PRODUCTION — serverX (shared dev/staging)
# ══════════════════════════════════════════════════════════════════════════════

# ── DEV ──────────────────────────────────────────────────────────────────────
[dev.deploy.parameters]
stack_name = "TempMonitor-saas-dev"
resolve_s3 = true
capabilities = "CAPABILITY_IAM"
confirm_changeset = false
region = "us-west-2"
parameter_overrides = """
  Environment=dev
  DeploymentId=244d4b8211
  ProjectPrefix=temp-sensor
  DataSource=mysql
  MysqlHost=demo-new-db-cluster.cluster-ro-cyxsij4cwahs.us-east-1.rds.amazonaws.com
  MysqlPort=3306
  MysqlUser=Demo_aurora
  MysqlDatabase=Demo_aurora
"""
# MysqlPassword passed via: --parameter-overrides "MysqlPassword=xxx"
# or via GitHub secret in CD workflow

