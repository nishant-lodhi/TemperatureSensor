# ─────────────────────────────────────────────────────────────────────────────
# SAM Deploy Configuration — one section per environment
#
# Usage:
#   sam deploy --config-env dev     --config-file infra/samconfig.toml --parameter-overrides "MysqlPassword=xxx"
#   sam deploy --config-env staging --config-file infra/samconfig.toml --parameter-overrides "MysqlPassword=xxx"
#   sam deploy --config-env prod    --config-file infra/samconfig.toml --parameter-overrides "MysqlPassword=xxx"
#
# MysqlPassword is NEVER stored in this file — always passed at deploy time.
# ─────────────────────────────────────────────────────────────────────────────

version = 0.1

# ── DEV environment ─────────────────────────────────────────────────────────
[dev.deploy.parameters]
stack_name         = "TempSensor-Dashboard-dev"
resolve_s3         = true
capabilities       = "CAPABILITY_IAM CAPABILITY_NAMED_IAM"
confirm_changeset  = false
region             = "us-west-2"
parameter_overrides = """
  Environment=dev
  DeploymentId=bd85d9b5e9
  ProjectPrefix=TempSensor
  DataSource=mysql
  MysqlHost=demo-new-db-cluster.cluster-ro-cyxsij4cwahs.us-east-1.rds.amazonaws.com
  MysqlPort=3306
  MysqlUser=Demo_aurora
  MysqlDatabase=Demo_aurora
"""

